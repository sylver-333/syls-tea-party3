<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book a Table - Syl's Tea Party</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="header">
  <a href="index.html" class="logo">Syl's <span>Tea Party</span></a>
  <nav class="navbar">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="menu.html">Menu</a>
    <a href="events.html">Events</a>
    <a href="book.html">Book</a>
    <a href="contact.html">Contact</a>
  </nav>
  <a href="book.html" class="btn">Reserve Table</a>
  <div id="menu-btn" class="fas fa-bars"></div>
</header>

<section class="book">
  <h2 class="section-title">Reserve Your Table</h2>
  <form action="#" class="booking-form">
    <input type="text" placeholder="Full Name" required>
    <input type="email" placeholder="Email" required>
    <input type="tel" placeholder="Phone Number" required>
    <input type="date" required>
    <input type="time" required>
    <select required>
      <option value="" disabled selected>Number of Guests</option>
      <option>1</option>
      <option>2</option>
      <option>3</option>
      <option>4</option>
      <option>5+</option>
    </select>
    <textarea placeholder="Special Requests"></textarea>
    <button type="submit" class="btn btn-primary">Reserve Now</button>
  </form>
</section>

<footer>
  <p>© 2026 Syl's Tea Party. All rights reserved.</p>
</footer>
</body>
</html>
